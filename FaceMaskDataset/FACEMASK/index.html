<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/images/favicon/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/images/favicon/apple-touch-icon.png">

<title>Page Not Found</title>
<style>
  :root {
    --primary: #3b82f6;
    --primary-dark: #2563eb;
    --primary-light: #93c5fd;
    --bg: #f4f7fb;
    --text: #1f2937;
    --text-light: #6b7280;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    min-height: 100vh;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    background: var(--primary);
    opacity: 0.07;
    filter: blur(10px);
  }
  .blob1 { width: 420px; height: 420px; top: -140px; left: -140px; }
  .blob2 { width: 320px; height: 320px; bottom: -110px; right: -90px; }
  .blob3 { width: 200px; height: 200px; bottom: 12%; left: 6%; opacity: 0.05; }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px;
    max-width: 620px;
  }

  .illustration {
    width: 260px;
    max-width: 70%;
    margin: 0 auto 10px;
    display: block;
  }

  .float {
    animation: float 3.5s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-14px); }
  }

  .code {
    font-size: 96px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -3px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-top: 6px;
    user-select: none;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    margin: 6px 0 12px;
  }

  p {
    font-size: 16px;
    color: var(--text-light);
    line-height: 1.6;
    margin-bottom: 34px;
  }

  .btn-home {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 28px;
    background-color: var(--primary);
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    border-radius: 30px;
    transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
  }

  .btn-home:hover {
    background-color: var(--primary-dark);
    transform: translateY(-2px);
    box-shadow: 0 12px 26px rgba(37, 99, 235, 0.4);
  }

  .btn-home svg {
    width: 18px;
    height: 18px;
    stroke: #fff;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  @media (max-width: 480px) {
    .code { font-size: 68px; }
    h1 { font-size: 21px; }
    p { font-size: 14px; }
    .container { padding: 30px 20px; }
    .illustration { width: 200px; }
  }
</style>
</head>
<body>

  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>

  <div class="container">

    <!-- Custom illustration: a "searching eye / lens" scene, tied to a computer-vision theme -->
    <svg class="illustration float" viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#3b82f6"/>
          <stop offset="100%" stop-color="#2563eb"/>
        </linearGradient>
      </defs>

      <!-- floating dots / scattered "pixels" -->
      <circle cx="30" cy="40" r="4" fill="#93c5fd"/>
      <circle cx="270" cy="60" r="5" fill="#bfdbfe"/>
      <circle cx="255" cy="200" r="4" fill="#93c5fd"/>
      <circle cx="40" cy="210" r="5" fill="#bfdbfe"/>
      <circle cx="20" cy="140" r="3" fill="#93c5fd"/>
      <circle cx="280" cy="140" r="3" fill="#93c5fd"/>

      <!-- dashed scan frame corners, camera/vision motif -->
      <path d="M60 40 h-20 a10 10 0 0 0 -10 10 v20" stroke="#93c5fd" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M240 40 h20 a10 10 0 0 1 10 10 v20" stroke="#93c5fd" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M60 220 h-20 a10 10 0 0 1 -10 -10 v-20" stroke="#93c5fd" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M240 220 h20 a10 10 0 0 0 10 -10 v-20" stroke="#93c5fd" stroke-width="4" fill="none" stroke-linecap="round"/>

      <!-- document -->
      <rect x="105" y="70" width="90" height="115" rx="8" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
      <line x1="120" y1="95" x2="180" y2="95" stroke="#bfdbfe" stroke-width="5" stroke-linecap="round"/>
      <line x1="120" y1="112" x2="180" y2="112" stroke="#e5edfb" stroke-width="5" stroke-linecap="round"/>
      <line x1="120" y1="129" x2="160" y2="129" stroke="#e5edfb" stroke-width="5" stroke-linecap="round"/>

      <!-- big question mark on the document -->
      <text x="150" y="172" font-size="42" font-weight="800" fill="url(#lensGrad)" text-anchor="middle" font-family="Arial, sans-serif">?</text>

      <!-- magnifying glass (camera-lens style) -->
      <circle cx="205" cy="150" r="34" fill="#ffffff" stroke="url(#lensGrad)" stroke-width="7"/>
      <circle cx="205" cy="150" r="20" fill="#eaf2ff"/>
      <circle cx="197" cy="142" r="6" fill="#ffffff"/>
      <line x1="228" y1="173" x2="252" y2="197" stroke="url(#lensGrad)" stroke-width="9" stroke-linecap="round"/>
    </svg>

    <div class="code">404</div>

    <h1>Page not found</h1>
    <p>The page you're looking for might have been moved, renamed, or never existed.</p>

    <a href="/index.html" class="btn-home">
      <svg viewBox="0 0 24 24">
        <path d="M3 12l9-9 9 9"></path>
        <path d="M5 10v10a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-5h2v5a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1V10"></path>
      </svg>
      Back to Home
    </a>

  </div>

</body>
</html>
